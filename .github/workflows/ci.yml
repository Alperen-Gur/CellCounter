name: CI

on:
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - "CellCounting/**"
      - "CellCounting.xcodeproj/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "desktop/**"
      - "CellCounting/**"
      - "CellCounting.xcodeproj/**"

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # Tauri v2 Linux system dependencies (webkit2gtk 4.1).
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libappindicator3-dev \
            patchelf

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      # Frontend gate — typecheck + production bundle. Also creates ../dist so
      # tauri-build's config validation passes in the backend step below.
      - name: Frontend typecheck + build
        working-directory: desktop
        run: |
          npx tsc --noEmit
          npm run build

      # The uv externalBin sidecar must exist for the host target, or
      # tauri-build's config validation fails the cargo check below.
      - name: Fetch uv sidecar (host target)
        shell: bash
        working-directory: desktop/src-tauri
        run: |
          set -euo pipefail
          mkdir -p binaries
          base=https://github.com/astral-sh/uv/releases/latest/download
          case "${{ matrix.os }}" in
            windows-latest)
              curl -fL -o uv.zip "$base/uv-x86_64-pc-windows-msvc.zip"
              unzip -o uv.zip uv.exe -d binaries
              mv binaries/uv.exe binaries/uv-x86_64-pc-windows-msvc.exe ;;
            ubuntu-latest)
              curl -fL -o uv.tgz "$base/uv-x86_64-unknown-linux-gnu.tar.gz"
              tar xzf uv.tgz
              mv uv-x86_64-unknown-linux-gnu/uv binaries/uv-x86_64-unknown-linux-gnu
              chmod +x binaries/uv-x86_64-unknown-linux-gnu ;;
            macos-latest)
              arch=$(uname -m)
              if [ "$arch" = "arm64" ]; then triple=aarch64-apple-darwin; else triple=x86_64-apple-darwin; fi
              curl -fL -o uv.tgz "$base/uv-$triple.tar.gz"
              tar xzf uv.tgz
              mv "uv-$triple/uv" "binaries/uv-$triple"
              chmod +x "binaries/uv-$triple" ;;
          esac
          ls -l binaries

      # Backend gate — compiles the Rust/Tauri crate on every OS. The
      # windows-latest leg is the Windows-portability check.
      - name: Backend cargo check
        working-directory: desktop/src-tauri
        run: cargo check --locked

  # Native macOS (Swift) app — the shipping 1.0.2 binary. Compiles the Xcode
  # project with signing disabled (no developer team in CI).
  swift-build:
    name: swift-build (macos)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build native macOS app
        run: |
          xcodebuild build \
            -project CellCounting.xcodeproj \
            -target CellCounting \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

  # AGPL guard — this project is MIT. Fail if any Ultralytics/YOLO (AGPL-3.0)
  # reference is reintroduced into tracked source, keeping THIRD_PARTY_LICENSES
  # honest. Only the license file's own explanatory text is exempt.
  license-guard:
    name: license-guard (no AGPL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail on Ultralytics/YOLO references
        run: |
          if git grep -niE 'ultralytics|yolo_detect|YOLODetectionService|YOLODownloader' -- ':!THIRD_PARTY_LICENSES.md' ':!.github/workflows/ci.yml'; then
            echo "::error::AGPL (Ultralytics/YOLO) reference found in tracked source — this project is MIT."
            exit 1
          fi
          echo "OK: no AGPL/Ultralytics references in tracked source."
