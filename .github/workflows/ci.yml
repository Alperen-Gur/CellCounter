name: CI

on:
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "desktop/**"

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # Tauri v2 Linux system dependencies (webkit2gtk 4.1).
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libappindicator3-dev \
            patchelf

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      # Frontend gate — typecheck + production bundle. Also creates ../dist so
      # tauri-build's config validation passes in the backend step below.
      - name: Frontend typecheck + build
        working-directory: desktop
        run: |
          npx tsc --noEmit
          npm run build

      # Backend gate — compiles the Rust/Tauri crate on every OS. The
      # windows-latest leg is the Windows-portability check.
      - name: Backend cargo check
        working-directory: desktop/src-tauri
        run: cargo check --locked
