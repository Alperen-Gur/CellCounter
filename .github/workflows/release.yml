name: Release

# Build installable binaries and attach them to a GitHub Release.
# Builds the cross-platform Tauri app. Trigger by pushing a `desktop-v*` tag
# (e.g. `git tag desktop-v0.1.0 && git push --tags`) or from the Actions tab.
# NOTE: plain `v*` tags are reserved for the native macOS (Swift) releases, which
# are published manually — they must NOT trigger this Tauri build.
on:
  push:
    tags: ["desktop-v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      # Bundle uv as a Tauri externalBin sidecar so the installer is
      # self-contained (no `uv` on PATH required). Files must be named
      # `uv-<target-triple>[.exe]` for tauri to match them to the build target.
      - name: Fetch uv sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        working-directory: desktop/src-tauri
        run: |
          set -euo pipefail
          mkdir -p binaries
          base=https://github.com/astral-sh/uv/releases/download/0.11.29
          curl -fL -o uv.zip "$base/uv-x86_64-pc-windows-msvc.zip"
          unzip -o uv.zip uv.exe -d binaries
          mv binaries/uv.exe binaries/uv-x86_64-pc-windows-msvc.exe
          ls -l binaries

      - name: Fetch uv sidecar (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        working-directory: desktop/src-tauri
        run: |
          set -euo pipefail
          mkdir -p binaries
          base=https://github.com/astral-sh/uv/releases/download/0.11.29
          curl -fL -o uv-arm.tar.gz "$base/uv-aarch64-apple-darwin.tar.gz"
          curl -fL -o uv-x64.tar.gz "$base/uv-x86_64-apple-darwin.tar.gz"
          tar xzf uv-arm.tar.gz
          tar xzf uv-x64.tar.gz
          # A universal build compiles each arch separately, and each per-arch
          # build validates its own externalBin, so both per-arch binaries must
          # exist; tauri lipos them into the universal .app. The universal file
          # is provided too, harmlessly, in case a tauri version wants it.
          mv uv-aarch64-apple-darwin/uv binaries/uv-aarch64-apple-darwin
          mv uv-x86_64-apple-darwin/uv binaries/uv-x86_64-apple-darwin
          lipo -create -output binaries/uv-universal-apple-darwin \
            binaries/uv-aarch64-apple-darwin binaries/uv-x86_64-apple-darwin
          chmod +x binaries/uv-aarch64-apple-darwin binaries/uv-x86_64-apple-darwin binaries/uv-universal-apple-darwin
          ls -l binaries

      - name: Build app + publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'desktop-v__VERSION__' }}
          releaseName: "CellCounter __VERSION__"
          releaseBody: |
            CellCounter desktop build.

            **macOS**: unsigned/not-yet-notarized — on first launch, right-click → Open,
            or System Settings → Privacy & Security → Open Anyway.
            **Windows**: unsigned — SmartScreen may warn; More info → Run anyway.

            First run: open the Models tab and install Cellpose (downloads the Python
            environment via uv). See docs/INSTALL.md.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
